services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      GATEWAY_DOMAIN: ${GATEWAY_DOMAIN:-agent-gateway.eilcard.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - app
      - pilot-gateway

  pilot-gateway:
    build:
      context: .
      dockerfile: packages/pilot-gateway-sinyalle/Dockerfile
    restart: unless-stopped
    expose:
      - "8787"
    environment:
      GATEWAY_PORT: "8787"
      GATEWAY_ISSUER: ${GATEWAY_ISSUER:-https://agent-gateway.eilcard.com}
      PILOT_EIL_CARD_ID: ${PILOT_EIL_CARD_ID:-sinyalle.com}
      PILOT_CLIENT_ID: ${PILOT_CLIENT_ID:-eil-pilot-agent}

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgresql://digitalcard:${POSTGRES_PASSWORD}@postgres:5432/digitalcard
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${APP_URL}
      NEXT_PUBLIC_APP_URL: ${APP_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      SUPPORT_EMAIL: ${SUPPORT_EMAIL}
      BILLING_EMAIL: ${BILLING_EMAIL}
      PLATFORM_OPERATOR_EMAIL: ${PLATFORM_OPERATOR_EMAIL:-platform@eilcard.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NEXT_PUBLIC_GITHUB_URL: ${NEXT_PUBLIC_GITHUB_URL:-https://github.com/Mendocan/eilcard}
      POLAR_ACCESS_TOKEN: ${POLAR_ACCESS_TOKEN:-}
      POLAR_WEBHOOK_SECRET: ${POLAR_WEBHOOK_SECRET:-}
      POLAR_SERVER: ${POLAR_SERVER:-production}
      POLAR_PRODUCT_VERIFIED: ${POLAR_PRODUCT_VERIFIED:-}
      POLAR_PRODUCT_PRO: ${POLAR_PRODUCT_PRO:-}
      SUBSCRIPTION_GRACE_DAYS: ${SUBSCRIPTION_GRACE_DAYS:-21}
      CRON_SECRET: ${CRON_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    environment:
      DATABASE_URL: postgresql://digitalcard:${POSTGRES_PASSWORD}@postgres:5432/digitalcard
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      APP_URL: ${APP_URL}
      NEXT_PUBLIC_APP_URL: ${APP_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: digitalcard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: digitalcard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digitalcard"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  caddydata:
  caddyconfig:
